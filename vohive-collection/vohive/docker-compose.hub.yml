# Docker Compose 配置 - 使用 DockerHub 预构建镜像
# 镜像地址: dahai1993/vohive
# 用法: docker-compose -f docker-compose.hub.yml up -d

services:
  vohive:
    image: dahai1993/vohive:latest
    container_name: vohive
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      # 配置文件 (首次运行需创建)
      - ./config:/app/config
      - ./data:/app/data
      # 日志目录
      - ./logs:/app/logs
      - /dev:/dev
      - /sys:/sys
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=/app/config/config.yaml
